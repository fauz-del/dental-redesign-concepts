<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Willow Family Dental</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <div class="logo"><i class="fa-solid fa-tooth"></i> <span id="logoText"></span></div>
      <nav class="nav" id="nav"></nav>
      <a href="#contact" class="btn btn-primary btn-sm" id="headerCta">Book a Call</a>
    </div>
  </header>

  <section class="hero">
    <div class="container hero-inner">
      <div class="hero-copy">
        <p class="eyebrow" id="heroEyebrow"></p>
        <h1 id="heroTitle"></h1>
        <p class="hero-desc" id="heroDesc"></p>
        <div class="hero-actions">
          <a href="#contact" class="btn btn-primary" id="heroCta"></a>
          <a href="#services" class="btn btn-ghost" id="heroSecondary"></a>
        </div>
        <div class="hero-stats" id="heroStats"></div>
      </div>
      <div class="hero-media">
        <img id="heroImg" src="" alt="Patient smiling at the dentist">
        <div class="slot-card">
          <i class="fa-regular fa-calendar-check"></i>
          <div>
            <p class="slot-label" id="slotLabel"></p>
            <p class="slot-time"><span id="slotDay"></span> · <span id="slotTime"></span></p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="about" id="about">
    <div class="container about-inner">
      <div class="about-media">
        <img id="aboutImg" src="" alt="Willow Family Dental team">
        <div class="about-badge">
          <p class="badge-val" id="aboutBadgeVal"></p>
          <p class="badge-label" id="aboutBadgeLabel"></p>
        </div>
      </div>
      <div class="about-copy">
        <p class="eyebrow" id="aboutEyebrow"></p>
        <h2 id="aboutTitle"></h2>
        <p class="about-desc" id="aboutDesc"></p>
        <ul class="about-points" id="aboutPoints"></ul>
      </div>
    </div>
  </section>

  <section class="services" id="services">
    <div class="container">
      <div class="services-head">
        <p class="eyebrow">What We Offer</p>
        <h2>Complete Care for Every Smile</h2>
      </div>
      <div class="services-grid" id="servicesGrid"></div>
    </div>
  </section>

  <section class="doctors" id="doctors">
    <div class="container">
      <div class="services-head">
        <p class="eyebrow">Our Team</p>
        <h2>Meet Your Dentists</h2>
      </div>
      <div class="doctors-grid" id="doctorsGrid"></div>
    </div>
  </section>

  <section class="reviews" id="reviews">
    <div class="container">
      <div class="services-head">
        <p class="eyebrow">Patient Stories</p>
        <h2>What Our Patients Say</h2>
      </div>
      <div class="reviews-grid" id="reviewsGrid"></div>
    </div>
  </section>

  <section class="contact" id="contact">
    <div class="container contact-inner">
      <div class="contact-copy">
        <p class="eyebrow">Get In Touch</p>
        <h2 id="contactTitle"></h2>
        <p class="about-desc" id="contactDesc"></p>
        <div class="contact-detail"><i class="fa-solid fa-phone"></i> <span id="contactPhone"></span></div>
        <div class="contact-detail"><i class="fa-solid fa-envelope"></i> <span id="contactEmail"></span></div>
        <div class="contact-detail"><i class="fa-solid fa-location-dot"></i> <span id="contactLocation"></span></div>
      </div>
      <form class="contact-form" onsubmit="event.preventDefault(); alert('Thanks! We'll be in touch shortly.');">
        <input type="text" placeholder="Full Name" required>
        <input type="tel" placeholder="Phone Number" required>
        <select id="formServiceSelect" required></select>
        <textarea placeholder="Anything we should know?" rows="3"></textarea>
        <button type="submit" class="btn btn-primary">Request Appointment</button>
      </form>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <div class="logo"><i class="fa-solid fa-tooth"></i> <span id="footerLogo"></span></div>
        <p id="footerDesc"></p>
      </div>
      <div class="footer-links">
        <h4>Quick Links</h4>
        <div id="footerNav"></div>
      </div>
      <div class="footer-contact">
        <h4>Contact</h4>
        <p id="footerPhone"></p>
        <p id="footerEmail"></p>
        <a id="footerMaps" href="" target="_blank" id="footerLocation"></a>
      </div>
    </div>
    <div class="footer-bottom">
      <p id="footerTagline"></p>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
